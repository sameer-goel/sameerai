<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sameerai Universe</title>
    <link rel="stylesheet" href="assets/styles/styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">

</head>

<body>
    <div class="portal-container">
        <!-- Background particles -->
        <div class="particles" id="particles"></div>



        <!-- Main portal -->
        <div class="game-layout">
            <!-- Work Section -->
            <div class="realm-section work-section" data-realm="ai">
                <div class="realm-icon">🤖</div>
                <div class="realm-title">WORK</div>
                <div class="realm-subtitle">AI & Technology</div>
                <div class="enter-btn">Enter Realm</div>
            </div>

            <!-- Life Section -->
            <div class="realm-section life-section" data-realm="soul">
                <div class="realm-icon">❤️</div>
                <div class="realm-title">LIFE</div>
                <div class="realm-subtitle">Growth & Balance</div>
                <div class="enter-btn">Enter Realm</div>
            </div>
        </div>

        <!-- Hi Button -->
        <div class="hi-button-container">
            <a href="pages/morethangood.html" class="hi-button">Hi</a>
            <a href="https://www.sameer-goel.com" class="website-button" target="_blank">sameer-goel.com</a>
        </div>

        <!-- Universe Title at Bottom -->
        <div class="universe-title-bottom">
            <h1 class="brand-name">Sameerai Universe</h1>
            <div class="stars">✦✧✦✧</div>
        </div>


    </div>

    <script src="assets/scripts/script.js"></script>
</body>

</html>
