<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Interactive Personal Portal</title>
    <link rel="stylesheet" href="styles.css">
    <link
        href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap"
        rel="stylesheet">
</head>

<body>
    <div class="portal-container">
        <!-- Background particles -->
        <div class="particles" id="particles"></div>

        <!-- Main portal -->
        <div class="portal-content">
            <header class="portal-header">
                <h1 class="portal-title">Welcome to My Universe</h1>
                <p class="portal-subtitle">Explore the intersection of technology and consciousness</p>
            </header>

            <div class="atomic-system">
                <!-- Central Atom -->
                <div class="atom-core">
                    <div class="nucleus">
                        <div class="proton"></div>
                        <div class="neutron"></div>
                        <div class="proton"></div>
                        <div class="neutron"></div>
                    </div>
                    <div class="electron-ring ring-1">
                        <div class="electron"></div>
                    </div>
                    <div class="electron-ring ring-2">
                        <div class="electron"></div>
                        <div class="electron"></div>
                    </div>
                    <div class="electron-ring ring-3">
                        <div class="electron"></div>
                    </div>
                </div>

                <!-- Orbiting Icons -->
                <div class="orbital-system">
                    <div class="orbit-path orbit-ai">
                        <div class="icon-container" data-realm="ai">
                            <div class="floating-icon ai-icon">
                                <div class="icon-glow"></div>
                                <div class="icon-content">
                                    <span class="icon-symbol">🤖</span>
                                    <h3>Science of AI</h3>
                                    <p>Artificial Intelligence & Technology</p>
                                </div>
                            </div>
                        </div>
                    </div>

                    <div class="orbit-path orbit-soul">
                        <div class="icon-container" data-realm="soul">
                            <div class="floating-icon soul-icon">
                                <div class="icon-glow"></div>
                                <div class="icon-content">
                                    <span class="icon-symbol">🧘</span>
                                    <h3>Science of Soul</h3>
                                    <p>Consciousness & Spirituality</p>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>

        <!-- AI Realm Modal -->
        <div class="realm-modal" id="ai-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Science of AI</h2>
                    <button class="close-btn" data-modal="ai-modal">&times;</button>
                </div>
                <div class="presentations-grid" id="ai-presentations">
                    <!-- AI presentations will be loaded here -->
                </div>
            </div>
        </div>

        <!-- Soul Realm Modal -->
        <div class="realm-modal" id="soul-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Science of Soul</h2>
                    <button class="close-btn" data-modal="soul-modal">&times;</button>
                </div>
                <div class="presentations-grid" id="soul-presentations">
                    <!-- Soul presentations will be loaded here -->
                </div>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
