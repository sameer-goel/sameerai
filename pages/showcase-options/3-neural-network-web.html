<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Neural Network Web Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .neural-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .neural-network {
            position: relative;
            width: 800px;
            height: 600px;
        }

        .neural-connection {
            position: absolute;
            height: 2px;
            background: linear-gradient(90deg, rgba(255, 0, 255, 0.3), rgba(0, 255, 255, 0.3));
            transform-origin: left center;
            opacity: 0.6;
            animation: pulse-connection 3s ease-in-out infinite;
        }

        @keyframes pulse-connection {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 0.8; }
        }

        .neural-node {
            position: absolute;
            width: 140px;
            height: 90px;
            cursor: pointer;
            transition: all 0.4s ease;
        }

        .neural-node:hover {
            transform: scale(1.1);
            z-index: 10;
        }

        .neural-node:hover .neural-connections {
            opacity: 1;
        }

        .node-card {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 2px solid rgba(255, 0, 255, 0.4);
            border-radius: 15px;
            backdrop-filter: blur(10px);
            overflow: hidden;
            position: relative;
            transition: all 0.4s ease;
        }

        .neural-node:hover .node-card {
            border-color: rgba(255, 0, 255, 0.8);
            box-shadow: 0 0 30px rgba(255, 0, 255, 0.5);
        }

        .node-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 13px;
            filter: hue-rotate(270deg) saturate(1.2);
            transition: filter 0.4s ease;
        }

        .neural-node:hover .node-card img {
            filter: hue-rotate(0deg) saturate(1);
        }

        .node-pulse {
            position: absolute;
            top: 50%;
            left: 50%;
            width: 10px;
            height: 10px;
            background: #ff00ff;
            border-radius: 50%;
            transform: translate(-50%, -50%);
            animation: node-pulse 2s ease-in-out infinite;
        }

        @keyframes node-pulse {
            0% { transform: translate(-50%, -50%) scale(0); opacity: 1; }
            100% { transform: translate(-50%, -50%) scale(3); opacity: 0; }
        }

        .synaptic-spark {
            position: absolute;
            width: 4px;
            height: 4px;
            background: #00ffff;
            border-radius: 50%;
            animation: spark-travel 2s linear infinite;
        }

        @keyframes spark-travel {
            0% { transform: translateX(0) scale(1); opacity: 1; }
            50% { transform: translateX(50px) scale(1.5); opacity: 0.8; }
            100% { transform: translateX(100px) scale(0); opacity: 0; }
        }

        /* Position nodes in organic network pattern */
        .neural-node:nth-child(1) { top: 50px; left: 100px; }
        .neural-node:nth-child(2) { top: 80px; right: 150px; }
        .neural-node:nth-child(3) { top: 200px; left: 50px; }
        .neural-node:nth-child(4) { top: 250px; right: 100px; }
        .neural-node:nth-child(5) { bottom: 150px; left: 200px; }
        .neural-node:nth-child(6) { bottom: 100px; right: 200px; }

        .title {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #ff00ff;
            font-size: 2rem;
            text-shadow: 0 0 20px #ff00ff;
            z-index: 20;
        }

        .brain-wave {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #ff00ff, transparent);
            animation: brain-wave 4s ease-in-out infinite;
        }

        @keyframes brain-wave {
            0%, 100% { transform: translateX(-100%); }
            50% { transform: translateX(100%); }
        }
    </style>
</head>
<body>
    <div class="neural-container">
        <div class="title">🧠 Neural Network Web</div>
        <div class="brain-wave" style="top: 20%;"></div>
        <div class="brain-wave" style="top: 40%; animation-delay: 1s;"></div>
        <div class="brain-wave" style="top: 60%; animation-delay: 2s;"></div>
        <div class="brain-wave" style="top: 80%; animation-delay: 3s;"></div>
        
        <div class="neural-network">
            <!-- Neural connections -->
            <div class="neural-connection" style="top: 95px; left: 240px; width: 280px; transform: rotate(15deg);"></div>
            <div class="neural-connection" style="top: 125px; left: 190px; width: 200px; transform: rotate(-30deg);"></div>
            <div class="neural-connection" style="top: 245px; left: 190px; width: 250px; transform: rotate(45deg);"></div>
            <div class="neural-connection" style="top: 295px; left: 240px; width: 180px; transform: rotate(-15deg);"></div>
            <div class="neural-connection" style="top: 395px; left: 340px; width: 160px; transform: rotate(30deg);"></div>
            
            <div class="neural-node" onclick="alert('Gen AI Gym for Employees')">
                <div class="node-card">
                    <img src="../presentations/genai-gym-for-employees-cover.png" alt="Gen AI Gym">
                    <div class="node-pulse"></div>
                </div>
            </div>
            
            <div class="neural-node" onclick="alert('Generative Agents 2023')">
                <div class="node-card">
                    <img src="../presentations/Generative-Agents-Cover.png" alt="Generative Agents">
                    <div class="node-pulse" style="animation-delay: 0.5s;"></div>
                </div>
            </div>
            
            <div class="neural-node" onclick="alert('Science of AUM')">
                <div class="node-card">
                    <img src="../presentations/What is Truth about AUM-cover.png" alt="Science of AUM">
                    <div class="node-pulse" style="animation-delay: 1s;"></div>
                </div>
            </div>
            
            <div class="neural-node" onclick="alert('Ever Asked Questions')">
                <div class="node-card">
                    <img src="../presentations/ever-asked-these-questions-cover.png" alt="Questions">
                    <div class="node-pulse" style="animation-delay: 1.5s;"></div>
                </div>
            </div>
            
            <div class="neural-node" onclick="alert('Sacred Geometry')">
                <div class="node-card">
                    <img src="../presentations/science-of-spirituality-cover.png" alt="Sacred Geometry">
                    <div class="node-pulse" style="animation-delay: 2s;"></div>
                </div>
            </div>
            
            <div class="neural-node" onclick="alert('Science of Universe')">
                <div class="node-card">
                    <img src="../presentations/science-of-aum-cover.png" alt="Universe">
                    <div class="node-pulse" style="animation-delay: 2.5s;"></div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
