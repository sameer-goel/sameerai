<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atomic Orbital Menu Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
        }

        .orbital-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .nucleus {
            position: absolute;
            width: 60px;
            height: 60px;
            background: radial-gradient(circle, #ffff00, #ff8800);
            border-radius: 50%;
            box-shadow: 0 0 40px rgba(255, 255, 0, 0.8);
            z-index: 10;
            animation: nucleusPulse 3s ease-in-out infinite;
        }

        @keyframes nucleusPulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.1); }
        }

        .orbital-ring {
            position: absolute;
            border: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: rotate 20s linear infinite;
        }

        .orbital-ring.ring-1 {
            width: 300px;
            height: 300px;
            animation-duration: 15s;
        }

        .orbital-ring.ring-2 {
            width: 500px;
            height: 500px;
            animation-duration: 25s;
            animation-direction: reverse;
        }

        .orbital-ring.ring-3 {
            width: 700px;
            height: 700px;
            animation-duration: 35s;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .orbital-item {
            position: absolute;
            width: 120px;
            height: 80px;
            top: -40px;
            left: 50%;
            transform: translateX(-50%);
            cursor: pointer;
            animation: counterRotate 15s linear infinite;
        }

        .ring-2 .orbital-item {
            animation: counterRotate 25s linear infinite reverse;
        }

        .ring-3 .orbital-item {
            animation: counterRotate 35s linear infinite;
        }

        @keyframes counterRotate {
            from { transform: translateX(-50%) rotate(0deg); }
            to { transform: translateX(-50%) rotate(-360deg); }
        }

        .orbital-card {
            width: 100%;
            height: 100%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            transition: all 0.3s ease;
            overflow: hidden;
            position: relative;
        }

        .orbital-card:hover {
            transform: scale(1.2);
            box-shadow: 0 10px 30px rgba(0, 212, 255, 0.5);
            border-color: rgba(0, 212, 255, 0.8);
        }

        .orbital-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
        }

        .orbital-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: radial-gradient(circle at center, transparent 60%, rgba(0, 212, 255, 0.2));
            opacity: 0;
            transition: opacity 0.3s ease;
        }

        .orbital-card:hover::after {
            opacity: 1;
        }

        /* Position items on different orbital rings */
        .ring-1 .orbital-item:nth-child(1) { transform: translateX(-50%) rotate(0deg); }
        .ring-1 .orbital-item:nth-child(2) { transform: translateX(-50%) rotate(120deg); }
        .ring-1 .orbital-item:nth-child(3) { transform: translateX(-50%) rotate(240deg); }

        .ring-2 .orbital-item:nth-child(1) { transform: translateX(-50%) rotate(0deg); }
        .ring-2 .orbital-item:nth-child(2) { transform: translateX(-50%) rotate(180deg); }

        .ring-3 .orbital-item:nth-child(1) { transform: translateX(-50%) rotate(0deg); }

        .title {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #00d4ff;
            font-size: 2rem;
            text-shadow: 0 0 20px #00d4ff;
            z-index: 20;
        }

        .electron {
            position: absolute;
            width: 6px;
            height: 6px;
            background: #00d4ff;
            border-radius: 50%;
            box-shadow: 0 0 10px #00d4ff;
            top: -3px;
            left: 50%;
            transform: translateX(-50%);
        }
    </style>
</head>
<body>
    <div class="orbital-container">
        <div class="title">⚛️ Atomic Orbital Menu</div>
        <div class="nucleus"></div>
        
        <!-- Inner orbital ring -->
        <div class="orbital-ring ring-1">
            <div class="electron"></div>
            <div class="orbital-item">
                <div class="orbital-card" onclick="alert('Gen AI Gym for Employees')">
                    <img src="../presentations/genai-gym-for-employees-cover.png" alt="Gen AI Gym">
                </div>
            </div>
            <div class="orbital-item">
                <div class="orbital-card" onclick="alert('Generative Agents 2023')">
                    <img src="../presentations/Generative-Agents-Cover.png" alt="Generative Agents">
                </div>
            </div>
            <div class="orbital-item">
                <div class="orbital-card" onclick="alert('Inner Intelligence AI')">
                    <img src="../books/CultivateInerIntelleigenceUsingAI-cover.png" alt="Inner Intelligence">
                </div>
            </div>
        </div>
        
        <!-- Middle orbital ring -->
        <div class="orbital-ring ring-2">
            <div class="electron"></div>
            <div class="electron" style="top: auto; bottom: -3px;"></div>
            <div class="orbital-item">
                <div class="orbital-card" onclick="alert('Science of AUM')">
                    <img src="../presentations/What is Truth about AUM-cover.png" alt="Science of AUM">
                </div>
            </div>
            <div class="orbital-item">
                <div class="orbital-card" onclick="alert('Ever Asked Questions')">
                    <img src="../presentations/ever-asked-these-questions-cover.png" alt="Questions">
                </div>
            </div>
        </div>
        
        <!-- Outer orbital ring -->
        <div class="orbital-ring ring-3">
            <div class="electron"></div>
            <div class="orbital-item">
                <div class="orbital-card" onclick="alert('Sacred Geometry')">
                    <img src="../presentations/science-of-spirituality-cover.png" alt="Sacred Geometry">
                </div>
            </div>
        </div>
    </div>
</body>
</html>
