<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Holographic Display Test</title>
    <style>
        body {
            margin: 0;
            padding: 0;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            min-height: 100vh;
            font-family: 'Arial', sans-serif;
            overflow: hidden;
            perspective: 1000px;
        }

        .holographic-container {
            position: relative;
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .hologram-projector {
            position: absolute;
            width: 100px;
            height: 100px;
            background: radial-gradient(circle, #00ffff, #0080ff);
            border-radius: 50%;
            box-shadow: 0 0 50px #00ffff;
            animation: pulse 2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 0.8; }
            50% { transform: scale(1.1); opacity: 1; }
        }

        .holographic-grid {
            position: relative;
            width: 800px;
            height: 600px;
            transform-style: preserve-3d;
        }

        .holo-card {
            position: absolute;
            width: 200px;
            height: 120px;
            background: linear-gradient(45deg, rgba(0, 255, 255, 0.1), rgba(0, 128, 255, 0.1));
            border: 1px solid rgba(0, 255, 255, 0.3);
            border-radius: 10px;
            backdrop-filter: blur(10px);
            cursor: pointer;
            transition: all 0.5s ease;
            transform-style: preserve-3d;
            overflow: hidden;
        }

        .holo-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(0, 255, 255, 0.4), transparent);
            animation: scan 3s linear infinite;
        }

        @keyframes scan {
            0% { left: -100%; }
            100% { left: 100%; }
        }

        .holo-card:hover {
            transform: translateZ(50px) rotateY(10deg);
            box-shadow: 0 20px 40px rgba(0, 255, 255, 0.3);
            border-color: rgba(0, 255, 255, 0.8);
        }

        .holo-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 10px;
            opacity: 0.8;
            filter: hue-rotate(180deg) saturate(1.2);
        }

        .holo-card:hover img {
            opacity: 1;
            filter: hue-rotate(0deg) saturate(1);
        }

        .projection-line {
            position: absolute;
            width: 2px;
            background: linear-gradient(to top, #00ffff, transparent);
            opacity: 0.6;
            animation: flicker 2s ease-in-out infinite;
        }

        @keyframes flicker {
            0%, 100% { opacity: 0.6; }
            50% { opacity: 0.2; }
        }

        /* Position cards in 3D space */
        .holo-card:nth-child(1) { transform: translate3d(-300px, -200px, 0px) rotateY(-15deg); }
        .holo-card:nth-child(2) { transform: translate3d(-100px, -200px, -50px) rotateY(-5deg); }
        .holo-card:nth-child(3) { transform: translate3d(100px, -200px, 0px) rotateY(5deg); }
        .holo-card:nth-child(4) { transform: translate3d(300px, -200px, -30px) rotateY(15deg); }
        .holo-card:nth-child(5) { transform: translate3d(-200px, 50px, -20px) rotateY(-10deg); }
        .holo-card:nth-child(6) { transform: translate3d(200px, 50px, -40px) rotateY(10deg); }

        .title {
            position: absolute;
            top: 50px;
            left: 50%;
            transform: translateX(-50%);
            color: #00ffff;
            font-size: 2rem;
            text-shadow: 0 0 20px #00ffff;
            animation: glow 2s ease-in-out infinite alternate;
        }

        @keyframes glow {
            from { text-shadow: 0 0 20px #00ffff; }
            to { text-shadow: 0 0 30px #00ffff, 0 0 40px #0080ff; }
        }
    </style>
</head>
<body>
    <div class="holographic-container">
        <div class="title">🌟 Holographic Display</div>
        <div class="hologram-projector"></div>
        
        <div class="holographic-grid">
            <div class="holo-card" onclick="alert('Gen AI Gym for Employees')">
                <img src="../../assets/images/presentations/genai-gym-for-employees-cover.png" alt="Gen AI Gym">
            </div>
            <div class="holo-card" onclick="alert('Generative Agents 2023')">
                <img src="../presentations/Generative-Agents-Cover.png" alt="Generative Agents">
            </div>
            <div class="holo-card" onclick="alert('Science of AUM')">
                <img src="../presentations/What is Truth about AUM-cover.png" alt="Science of AUM">
            </div>
            <div class="holo-card" onclick="alert('Ever Asked Questions')">
                <img src="../presentations/ever-asked-these-questions-cover.png" alt="Questions">
            </div>
            <div class="holo-card" onclick="alert('Sacred Geometry')">
                <img src="../presentations/science-of-spirituality-cover.png" alt="Sacred Geometry">
            </div>
            <div class="holo-card" onclick="alert('Science of Universe')">
                <img src="../presentations/science-of-aum-cover.png" alt="Universe">
            </div>
        </div>
    </div>
</body>
</html>
