<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Books</title>
    <link rel="stylesheet" href="assets/styles/styles.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        .page-container {
            min-height: 100vh;
            background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 50%, #16213e 100%);
            padding: 2rem 0;
        }
        
        .page-header {
            text-align: center;
            padding: 2rem;
            margin-bottom: 3rem;
        }
        
        .page-title {
            font-family: 'Orbitron', monospace;
            font-size: 3rem;
            font-weight: 900;
            color: #00d4ff;
            margin-bottom: 1rem;
            text-shadow: 0 0 20px rgba(0, 212, 255, 0.5);
        }
        
        .page-subtitle {
            font-size: 1.3rem;
            color: rgba(255, 255, 255, 0.8);
            margin-bottom: 2rem;
        }
        
        .back-icon {
            position: fixed;
            top: 2rem;
            left: 2rem;
            background: rgba(255, 255, 255, 0.1);
            color: white;
            border: 2px solid rgba(255, 255, 255, 0.2);
            width: 50px;
            height: 50px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            text-decoration: none;
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
        }
        
        .back-icon:hover {
            background: rgba(255, 255, 255, 0.2);
            border-color: #00d4ff;
            transform: scale(1.1);
        }
        
        .movies-container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }
        
        .movies-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 1.5rem;
            padding: 2rem 0;
        }
        
        .movie-card {
            background: rgba(255, 255, 255, 0.05);
            border: 2px solid rgba(0, 212, 255, 0.2);
            border-radius: 15px;
            overflow: hidden;
            cursor: pointer;
            transition: all 0.3s ease;
            aspect-ratio: auto;
            height: 400px;
            position: relative;
        }
        
        .movie-card:hover {
            transform: translateY(-8px);
            border-color: #00d4ff;
            box-shadow: 0 15px 40px rgba(0, 212, 255, 0.3);
        }
        
        .movie-poster {
            width: 100%;
            height: 100%;
            position: relative;
        }
        
        .movie-poster img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            background: #1a1a1a;
        }
        
        .movie-overlay {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(transparent, rgba(0, 0, 0, 0.95));
            padding: 1rem 0.8rem 0.8rem;
            transform: translateY(100%);
            transition: transform 0.3s ease;
            max-height: 60%;
            overflow: hidden;
        }
        
        .movie-card:hover .movie-overlay {
            transform: translateY(0);
        }
        
        .movie-title {
            font-size: 0.9rem;
            font-weight: 600;
            margin-bottom: 0.3rem;
            color: white;
            line-height: 1.2;
        }
        
        .movie-description {
            font-size: 0.7rem;
            color: rgba(255, 255, 255, 0.8);
            line-height: 1.3;
        }
        
        .movie-type {
            position: absolute;
            top: 1rem;
            right: 1rem;
            background: rgba(0, 212, 255, 0.8);
            padding: 0.4rem 0.8rem;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 500;
            color: white;
        }
    </style>
</head>
<body>
    <div class="page-container">
        <div class="particles" id="particles"></div>
        
        <a href="work.html" class="back-icon">←</a>
        
        <div class="page-header">
            <h1 class="page-title">📚 Books</h1>
            <p class="page-subtitle">AI-powered personal development and growth resources</p>
        </div>
        
        <div class="movies-container">
            <div class="movies-grid">
                <div class="movie-card" onclick="openPresentation('#')">
                    <div class="movie-poster">
                        <img src="assets/images/books/TheEyeOpenersBookCover.png" alt="The Eye Openers">
                        <div class="movie-overlay">
                            <div class="movie-title">The Eye Openers</div>
                            <div class="movie-description">Insights and revelations that change your perspective on life and reality.</div>
                        </div>
                        <div class="movie-type">Philosophy</div>
                    </div>
                </div>
                
                <div class="movie-card" onclick="openPresentation('https://www.canva.com/design/DAGT1-fee-4/oXT_UDn8gXHMD3jrfJHzmg/view')">
                    <div class="movie-poster">
                        <img src="assets/images/books/CultivateInerIntelleigenceUsingAI-cover.png" alt="Inner Intelligence">
                        <div class="movie-overlay">
                            <div class="movie-title">How to Cultivate Inner Intelligence using AI</div>
                            <div class="movie-description">Merge artificial and human intelligence for personal growth.</div>
                        </div>
                        <div class="movie-type">AI Psychology</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function openPresentation(url) {
            window.open(url, '_blank');
        }
        
        function createParticles() {
            const particlesContainer = document.getElementById('particles');
            const particleCount = 50;

            for (let i = 0; i < particleCount; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDelay = Math.random() * 6 + 's';
                
                const size = Math.random() * 3 + 1;
                particle.style.width = size + 'px';
                particle.style.height = size + 'px';
                
                particlesContainer.appendChild(particle);
            }
        }
        
        document.addEventListener('DOMContentLoaded', function() {
            createParticles();
        });
    </script>
</body>
</html>
