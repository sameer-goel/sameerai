<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Sameerai Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background: #000;
            color: #fff;
            font-family: 'Orbitron', monospace;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        .universe-title {
            text-align: center;
            margin-bottom: 60px;
        }

        .universe-title h1 {
            font-size: 3rem;
            font-weight: 900;
            margin-bottom: 10px;
        }

        .universe-subtitle {
            font-size: 1rem;
            color: #888;
        }

        .realms-container {
            display: flex;
            gap: 80px;
            align-items: center;
            justify-content: center;
            margin-bottom: 60px;
        }

        .realm {
            text-align: center;
            cursor: pointer;
        }

        .realm img {
            width: 250px;
            height: 250px;
            display: block;
            margin: 0 auto;
        }

        .footer-links {
            display: flex;
            gap: 30px;
        }

        .footer-link {
            color: #888;
            text-decoration: none;
            font-size: 0.9rem;
        }

        @media (max-width: 768px) {
            .realms-container {
                flex-direction: column;
                gap: 40px;
            }
            
            .realm img {
                width: 200px;
                height: 200px;
            }
        }
    </style>
</head>
<body>
    <div class="universe-title">
        <h1>Sameerai Universe</h1>
        <div class="universe-subtitle">✦✧ Where AI meets Inner Intelligence ✧✦</div>
    </div>
    
    <div class="realms-container">
        <div class="realm" onclick="enterRealm('work')">
            <img src="assets/icons/workicon.gif" alt="Work">
        </div>
        
        <div class="realm" onclick="enterRealm('life')">
            <img src="assets/icons/lifeicon.gif" alt="Life">
        </div>
    </div>
    
    <div class="footer-links">
        <a href="pages/morethangood.html" class="footer-link">Hi</a>
        <a href="https://www.sameer-goel.com" class="footer-link" target="_blank">sameer-goel.com</a>
    </div>

    <script>
        function enterRealm(realm) {
            if (realm === 'work') {
                window.location.href = 'pages/work.html';
            } else if (realm === 'life') {
                window.location.href = 'pages/life.html';
            }
        }
    </script>
</body>
</html>
