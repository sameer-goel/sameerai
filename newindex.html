<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>✨ Enter Sameerai Universe ✨</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
</head>

<body style="background: #000; color: #fff; font-family: 'Orbitron', monospace; height: 100vh; margin: 0; padding: 0; position: relative; overflow: hidden;">
    <!-- Animated starfield background -->
    <div id="stars" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 1;"></div>
    
    <!-- Initial landing screen with central GIF -->
    <div id="landing-screen" style="position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; transition: opacity 0.8s ease;">

        
        <!-- Central entry GIF -->
        <div id="entry-gif" style="cursor: pointer; transition: all 0.4s ease;" onclick="enterUniverse()">
            <img id="main-gif" src="assets/icons/digitalconsciousness.gif" alt="Digital Consciousness" style="width: 500px; height: 500px; filter: drop-shadow(0 0 50px rgba(0, 212, 255, 0.6)); transition: all 0.8s ease;">
        </div>
    </div>
    
    <!-- Main universe screen with two spheres (hidden initially) -->
    <div id="universe-screen" style="position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 2; opacity: 0; pointer-events: none; transition: opacity 0.8s ease;">
        <div style="display: flex; align-items: center; justify-content: center; height: 100vh;">
            <div style="display: flex; gap: 100px; align-items: center; justify-content: center;">
                
                <!-- Work/AI Icon with sub-spheres -->
                <div class="icon-container work-icon" onclick="window.location.href='pages/work.html'">
                    <img src="assets/icons/workicon.gif" alt="Work" style="width: 350px; height: 350px;">
                    <div class="hover-text">Artificial Intelligence</div>
                    <!-- Work sub-spheres positioned on left side -->
                    <div class="sub-sphere" data-label="GenAI" style="--angle: 135deg;"></div>
                    <div class="sub-sphere" data-label="AgenticAI" style="--angle: 180deg;"></div>
                    <div class="sub-sphere" data-label="Cloud" style="--angle: 225deg;"></div>
                </div>
                
                <!-- Life/Inner Intelligence Icon with sub-spheres -->
                <div class="icon-container life-icon" onclick="window.location.href='pages/life.html'">
                    <img src="assets/icons/lifeicon.gif" alt="Life" style="width: 350px; height: 350px;">
                    <div class="hover-text">Inner Intelligence</div>
                    <!-- Life sub-spheres positioned on right side -->
                    <div class="sub-sphere" data-label="Mind" style="--angle: 45deg;"></div>
                    <div class="sub-sphere" data-label="Body" style="--angle: 0deg;"></div>
                    <div class="sub-sphere" data-label="Soul" style="--angle: 315deg;"></div>
                </div>
            </div>
        </div>
        
        <!-- Footer title -->
        <div style="position: fixed; bottom: 40px; left: 50%; transform: translateX(-50%); text-align: center;">
            <div style="font-size: 1rem; color: #00d4ff; font-weight: 600; letter-spacing: 1px; text-shadow: 0 0 10px rgba(0, 212, 255, 0.8);">✦✧ Artificial Intelligence meets Inner Intelligence ✧✦</div>
        </div>
    </div>

    <script>
        // Create animated starfield background
        function createStars() {
            const starsContainer = document.getElementById('stars');
            const numStars = 200;
            
            for (let i = 0; i < numStars; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.width = Math.random() * 3 + 1 + 'px';
                star.style.height = star.style.width;
                star.style.background = '#fff';
                star.style.borderRadius = '50%';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.opacity = Math.random() * 0.8 + 0.2;
                star.style.animation = `twinkle ${Math.random() * 3 + 2}s infinite alternate`;
                starsContainer.appendChild(star);
            }
        }
        
        // Click sound using audio file
        function playClickSound() {
            const audio = new Audio('assets/clicksound/digitalconsciousnessclicksound.mp3');
            audio.volume = 0.7;
            audio.play().catch(e => console.log('Audio play failed:', e));
        }
        
        // Transition from landing to universe view with shrinking animation
        function enterUniverse() {
            playClickSound(); // Play click sound
            
            const mainGif = document.getElementById('main-gif');
            const landingScreen = document.getElementById('landing-screen');
            const universeScreen = document.getElementById('universe-screen');
            
            // Shrink digital consciousness to center point
            mainGif.style.transform = 'scale(0.01)';
            mainGif.style.opacity = '0';
            
            // Transition to universe screen with half delay
            setTimeout(() => {
                landingScreen.style.opacity = '0';
                landingScreen.style.pointerEvents = 'none';
                
                setTimeout(() => {
                    universeScreen.style.opacity = '1';
                    universeScreen.style.pointerEvents = 'auto';
                }, 200);
            }, 400);
        }
        
        // Add hover effect to entry GIF (no sound)
        document.getElementById('entry-gif').addEventListener('mouseenter', function() {
            this.style.transform = 'scale(1.1)';
            this.style.filter = 'drop-shadow(0 0 50px rgba(0, 212, 255, 0.8))';
        });
        
        document.getElementById('entry-gif').addEventListener('mouseleave', function() {
            this.style.transform = 'scale(1)';
            this.style.filter = 'drop-shadow(0 0 30px rgba(0, 212, 255, 0.6))';
        });
        

        
        // Add CSS styles dynamically
        const style = document.createElement('style');
        style.textContent = `
            /* Star twinkling animation */
            @keyframes twinkle {
                0% { opacity: 0.2; transform: scale(1); }
                100% { opacity: 1; transform: scale(1.2); }
            }
            
            /* Galaxy gradient animation for title */
            @keyframes galaxyGlow {
                0%, 100% { background-position: 0% 50%; }
                50% { background-position: 100% 50%; }
            }
            
            /* Main icon container styling */
            .icon-container {
                text-align: center;
                cursor: pointer;
                transition: all 0.4s ease;
                border-radius: 50%;
                position: relative;
            }
            
            /* Icon hover effects - scale and glow */
            .icon-container:hover {
                transform: scale(1.15);
                filter: drop-shadow(0 0 40px rgba(0, 212, 255, 0.8)) drop-shadow(0 0 80px rgba(0, 212, 255, 0.4));
            }
            
            /* Hover text that appears in center of icons */
            .hover-text {
                position: absolute;
                top: 175px;
                left: 175px;
                transform: translate(-50%, -50%);
                font-family: 'Orbitron', monospace;
                font-size: 1.2rem;
                font-weight: 700;
                color: #fff;
                text-shadow: 0 0 10px rgba(0, 0, 0, 0.8);
                opacity: 0;
                transition: opacity 0.4s ease;
                pointer-events: none;
                text-align: center;
                z-index: 10;
            }
            
            /* Show hover text on icon hover */
            .icon-container:hover .hover-text {
                opacity: 1;
            }
            
            /* Sub-sphere styling - hidden by default */
            .sub-sphere {
                position: absolute;
                width: 80px;
                height: 80px;
                background: radial-gradient(circle, rgba(0, 212, 255, 0.3), rgba(0, 212, 255, 0.1));
                border: 2px solid rgba(0, 212, 255, 0.6);
                border-radius: 50%;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                opacity: 0;
                transition: all 0.4s ease;
                display: flex;
                align-items: center;
                justify-content: center;
                font-size: 0.8rem;
                font-weight: 600;
                color: #fff;
                text-shadow: 0 0 5px rgba(0, 0, 0, 0.8);
                cursor: pointer;
                z-index: 5;
            }
            
            /* Sub-spheres pop out radially on hover using trigonometry */
            .icon-container:hover .sub-sphere {
                opacity: 1;
                transform: translate(-50%, -50%) translate(
                    calc(cos(var(--angle)) * 240px),
                    calc(sin(var(--angle)) * 240px)
                );
            }
            
            /* Display sub-sphere labels */
            .sub-sphere::before {
                content: attr(data-label);
            }
        `;
        document.head.appendChild(style);
        
        // Initialize starfield on page load
        createStars();
    </script>
</body>
</html>
